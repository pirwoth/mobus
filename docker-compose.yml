version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mobus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobus_pass}
      POSTGRES_DB: ${POSTGRES_DB:-mobus}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mobus-net

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    networks:
      - mobus-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - mobus-net

volumes:
  db-data:

networks:
  mobus-net:
    driver: bridge
